<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="robots" content="noindex">
    <link rel="stylesheet" href="/css/style.css"/>
    <title>uniquefilter</title>
    <script src="/js/main.js" type="module" defer></script>
</head>
<body>
<main>
    <h1 class="title">uniquefilter</h1>

    <div class="content-wrapper">
        <div id="auth-section">
            <input type="button" id="authorize-poe-button" value="Authorize Access to your Path of Exile account"/>
        </div>

        <div id="main-controls" class="requires-authorization">
            <div class="control-group">
                <label for="league-select">League</label>
                <select id="league-select">
                </select>
            </div>

            <div class="control-group">
                <label for="uniquestash-select">Unique Stash</label>
                <select id="uniquestash-select"></select>
            </div>

            <div class="control-group">
                <label for="filter-select">Filter</label>
                <select id="filter-select"></select>
            </div>

            <div class="control-group" id="update-filter-button-group">
                <input id="update-filter-button" type="button" value="Update Filter" disabled="disabled"/>
            </div>
        </div>

        <div id="options" class="requires-authorization">
            <div class="option-group">
                <input type="checkbox" id="only-global-drops-cb"/>
                <label for="only-global-drops-cb">Highlight only global drops</label>
            </div>

            <fieldset id="custom-style-fieldset">
                <legend>Custom Style</legend>
                <div id="custom-style-group">
                    <textarea id="custom-style-textarea" placeholder="Hint: Go to filterblade.xyz -> Advanced -> Filter Line Translator to create and copy a style rule."></textarea>
                </div>
            </fieldset>
        </div>

        <div id="status-container" class="requires-authorization">
            <!-- Messages will be rendered here by ui.js -->
        </div>
        
        <div id="collection-stats-container">
            <!-- Collection stats will be rendered here by ui.js -->
        </div>
    </div>

    <!-- Templates -->
    <template id="collection-stats-template">
        <div class="collection-stats-area">
            <div class="stats-summary-line">
                <span class="stat-item">
                    <span class="stat-number stat-owned" data-owned-count></span> owned
                </span>
                <span class="stat-divider">•</span>
                <span class="stat-item">
                    <span class="stat-number stat-missing" data-missing-count></span> missing
                </span>
                <button class="view-details-btn">View Details</button>
            </div>
        </div>
    </template>

    <template id="uniques-breakdown-template">
        <div class="modal-overlay">
            <div class="uniques-breakdown-modal">
                <div class="modal-header">
                    <h2>Collection Summary</h2>
                    <button class="close-button">×</button>
                </div>
                
                <div class="stats-summary">
                    <div class="stat-card stat-card-owned">
                        <div class="stat-number stat-number-owned" data-owned-count></div>
                        <div>Owned Uniques</div>
                    </div>
                    <div class="stat-card stat-card-missing">
                        <div class="stat-number stat-number-missing" data-missing-count></div>
                        <div>Missing Uniques</div>
                    </div>
                </div>
                
                <div class="lists-container">
                    <div class="list-section list-section-owned">
                        <h3>Owned (<span data-owned-count></span>)</h3>
                        <div class="items-list" data-owned-list></div>
                    </div>
                    <div class="list-section list-section-missing">
                        <h3>Missing (<span data-missing-count></span>)</h3>
                        <div class="items-list" data-missing-list></div>
                    </div>
                </div>
            </div>
        </div>
    </template>
</main>
</body>
</html>
